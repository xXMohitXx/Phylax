name: Phylax CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install phylax
    - name: Run Dataset Contracts
      run: phylax dataset run dataset.yaml -m app -f retrieve_and_respond
    - name: Run Graph Checks
      run: phylax graph-check
